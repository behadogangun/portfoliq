{% extends 'base.html' %}
{% block title %}Add Asset — PortfoliQ{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto;padding:40px 24px;">
    <div class="pq-page-title mb-1">Add Asset</div>
    <div class="pq-page-sub mb-4">{{ portfolio.name }}</div>

    <!-- Type Filter -->
    <div class="pq-card p-4 mb-3">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:10px;">Asset Type</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="typeFilter">
            <button type="button" onclick="setType('all')" id="btn-all"
                class="type-btn active"
                style="padding:7px 16px;border-radius:980px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;background:#0071e3;color:white;">
                All
            </button>
            <button type="button" onclick="setType('stock')" id="btn-stock"
                class="type-btn"
                style="padding:7px 16px;border-radius:980px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;background:rgba(0,0,0,0.05);color:#1d1d1f;">
                📈 Stocks
            </button>
            <button type="button" onclick="setType('crypto')" id="btn-crypto"
                class="type-btn"
                style="padding:7px 16px;border-radius:980px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;background:rgba(0,0,0,0.05);color:#1d1d1f;">
                🪙 Crypto
            </button>
        </div>
    </div>

    <!-- Search -->
    <div class="pq-card p-4 mb-3">
        <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px;">Search asset</label>
        <input type="text" id="searchInput" class="pq-input" placeholder="Search AAPL, BTC, ETH..." autocomplete="off">
    </div>

    <!-- Dropdown -->
    <div id="searchResults" style="
        display:none;
        background:#fff;
        border-radius:14px;
        box-shadow:0 8px 32px rgba(0,0,0,0.14);
        border:1px solid rgba(0,0,0,0.08);
        overflow:hidden;
        margin-top:-8px;
        margin-bottom:12px;">
    </div>

    <!-- Preview -->
    <div id="assetPreview" class="pq-card p-4 mb-3" style="display:none;">
        <div style="display:flex;align-items:center;gap:14px;">
            <img id="previewLogo" src="" style="width:44px;height:44px;border-radius:12px;object-fit:contain;background:#f5f5f7;padding:4px;" onerror="this.style.display='none'">
            <div>
                <div id="previewName" style="font-size:16px;font-weight:600;"></div>
                <div id="previewMeta" style="font-size:13px;color:#6e6e73;margin-top:2px;"></div>
            </div>
            <div style="margin-left:auto;text-align:right;">
                <div id="previewPrice" style="font-size:20px;font-weight:700;letter-spacing:-0.5px;"></div>
                <div id="previewChange" style="font-size:13px;margin-top:2px;"></div>
            </div>
        </div>
    </div>

    <!-- Form -->
    <div class="pq-card p-4">
        <form method="post" id="assetForm">
            {% csrf_token %}
            <input type="hidden" name="symbol" id="f_symbol">
            <input type="hidden" name="name" id="f_name">
            <input type="hidden" name="asset_type" id="f_asset_type">
            <input type="hidden" name="logo" id="f_logo">

            <div class="mb-3">
                <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px;">Quantity</label>
                <input type="number" name="quantity" id="f_quantity" class="pq-input" step="0.00000001" placeholder="0.00" required>
            </div>

            <div class="mb-3">
                <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px;">Average Buy Price (USD)</label>
                <input type="number" name="avg_buy_price" id="f_avg_price" class="pq-input" step="0.01" placeholder="0.00" required>
            </div>

            <div id="formError" style="font-size:13px;color:#c4162a;margin-bottom:12px;display:none;">
                Please search and select an asset first.
            </div>

            <div style="display:flex;gap:8px;">
                <button type="submit" class="btn-apple" style="padding:10px 20px;">Add Asset</button>
                <a href="{% url 'portfolio_detail' portfolio.pk %}" class="btn-apple-secondary" style="padding:10px 20px;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let selectedAsset = null;
    let activeType = 'all';
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    let debounceTimer;

    function setType(type) {
        activeType = type;
        // Button styles
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.style.background = 'rgba(0,0,0,0.05)';
            btn.style.color = '#1d1d1f';
        });
        const active = document.getElementById('btn-' + type);
        if (active) {
            active.style.background = '#0071e3';
            active.style.color = 'white';
        }
        // Update placeholder
        if (type === 'stock') searchInput.placeholder = 'Search AAPL, TSLA, NVDA...';
        else if (type === 'crypto') searchInput.placeholder = 'Search BTC, ETH, SOL...';
        else searchInput.placeholder = 'Search AAPL, BTC, ETH...';
        // Re-search if there's a query
        const q = searchInput.value.trim();
        if (q.length >= 1) fetchResults(q);
    }

    searchInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const q = searchInput.value.trim();
        if (q.length < 1) { searchResults.style.display = 'none'; return; }
        debounceTimer = setTimeout(() => fetchResults(q), 350);
    });

    function fetchResults(q) {
        fetch(`{% url 'asset_search' %}?q=${encodeURIComponent(q)}&type=${activeType}`)
            .then(r => r.json())
            .then(data => {
                let results = data.results;
                // Client-side filter by type
                if (activeType === 'stock') {
                    results = results.filter(r => r.type === 'stock');
                } else if (activeType === 'crypto') {
                    results = results.filter(r => r.type === 'crypto');
                }
                renderResults(results);
            });
    }

    function renderResults(results) {
        if (!results.length) {
            searchResults.innerHTML = `
                <div style="padding:16px;text-align:center;color:#6e6e73;font-size:13px;">
                    No results found. Try a different search.
                </div>`;
            searchResults.style.display = 'block';
            return;
        }
        searchResults.innerHTML = results.map(r => `
            <div onclick='selectAsset(${JSON.stringify(r)})'
                 style="display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid rgba(0,0,0,0.04);"
                 onmouseover="this.style.background='rgba(0,0,0,0.025)'"
                 onmouseout="this.style.background='transparent'">
                ${r.logo
                    ? `<img src="${r.logo}" style="width:32px;height:32px;border-radius:8px;object-fit:contain;background:#f5f5f7;padding:2px;" onerror="this.style.display='none'">`
                    : `<div style="width:32px;height:32px;border-radius:8px;background:rgba(0,113,227,0.08);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0071e3;">${r.symbol.slice(0,2)}</div>`
                }
                <div style="flex:1;">
                    <div style="font-size:14px;font-weight:600;color:#1d1d1f;">${r.symbol}</div>
                    <div style="font-size:12px;color:#6e6e73;">${r.name}</div>
                </div>
                <span style="font-size:11px;padding:3px 9px;border-radius:980px;
                    background:${r.type === 'crypto' ? 'rgba(255,149,0,0.1)' : 'rgba(0,113,227,0.1)'};
                    color:${r.type === 'crypto' ? '#b36200' : '#0071e3'};
                    font-weight:500;">${r.type}</span>
            </div>
        `).join('');
        searchResults.style.display = 'block';
    }

    function selectAsset(asset) {
        selectedAsset = asset;
        searchInput.value = `${asset.symbol} — ${asset.name}`;
        searchResults.style.display = 'none';

        document.getElementById('f_symbol').value = asset.symbol;
        document.getElementById('f_name').value = asset.name;
        document.getElementById('f_asset_type').value = asset.type;
        document.getElementById('f_logo').value = asset.logo || '';
        document.getElementById('formError').style.display = 'none';

        const preview = document.getElementById('assetPreview');
        preview.style.display = 'block';
        document.getElementById('previewLogo').src = asset.logo || '';
        document.getElementById('previewName').textContent = asset.name;
        document.getElementById('previewMeta').textContent = `${asset.symbol} · ${asset.type}`;
        document.getElementById('previewPrice').textContent = 'Loading...';
        document.getElementById('previewChange').textContent = '';

        fetch(`{% url 'asset_info' %}?symbol=${asset.symbol}&type=${asset.type}`)
            .then(r => r.json())
            .then(info => {
                if (info.price) {
                    document.getElementById('previewPrice').textContent = '$' + Number(info.price).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    document.getElementById('f_avg_price').value = info.price;
                }
                if (info.change_24h !== undefined) {
                    const el = document.getElementById('previewChange');
                    const sign = info.change_24h >= 0 ? '+' : '';
                    el.textContent = `${sign}${info.change_24h.toFixed(2)}% today`;
                    el.style.color = info.change_24h >= 0 ? '#1c7f3e' : '#c4162a';
                }
                if (info.sector) {
                    document.getElementById('previewMeta').textContent = `${asset.symbol} · ${info.sector}`;
                }
            }).catch(() => {
                document.getElementById('previewPrice').textContent = '';
            });
    }

    document.getElementById('assetForm').addEventListener('submit', e => {
        if (!selectedAsset) {
            e.preventDefault();
            document.getElementById('formError').style.display = 'block';
        }
    });

    document.addEventListener('click', e => {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
            searchResults.style.display = 'none';
        }
    });
</script>
{% endblock %}
